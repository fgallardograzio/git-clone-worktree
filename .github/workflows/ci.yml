name: CI

on:
  push:
    branches:
      - "**"

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Tools (mise)
        uses: jdx/mise-action@v4

      - name: Run Linters
        run: mise run lint:all
